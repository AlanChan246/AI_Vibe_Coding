<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>休閒遊戲館</title>
  <link rel="stylesheet" href="home.css" />
  <script src="../../showcase/assets/showcase-home.js" defer></script>
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <h1>休閒遊戲館</h1>
      <p>釣魚、飛行棋｜同機雙人為主，隨開隨玩</p>
    </header>

    <div class="game-grid">
      <a class="game-card fish" href="games/fishing/index.html">
        <div class="icon" aria-hidden="true">🎣</div>
        <h2>釣魚</h2>
        <p>15×15 cm 釣魚池、多種魚類與難度，支援單人計分與雙人輪流對戰。</p>
        <span class="cta">進入釣魚 →</span>
      </a>

      <a class="game-card flight" href="games/flight/index.html">
        <div class="icon" aria-hidden="true">✈</div>
        <h2>飛行棋</h2>
        <p>簡化規則：四人四機、共用環形航道；擲到 5 或 6 可出機場，踩到對手會送回停機坪。</p>
        <span class="cta">進入飛行棋 →</span>
      </a>
    </div>

    <footer class="site-footer">本頁為本地小遊戲合集 · 無需安裝</footer>
  </div>
</body>
</html>
