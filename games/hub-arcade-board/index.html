<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>遊戲大廳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="auth.css" />
  <script src="../../showcase/assets/showcase-home.js" defer></script>
</head>
<body class="home-page">
  <div class="home-aurora" aria-hidden="true">
    <div class="home-aurora__blob home-aurora__blob--a"></div>
    <div class="home-aurora__blob home-aurora__blob--b"></div>
    <div class="home-aurora__blob home-aurora__blob--c"></div>
  </div>
  <div class="home-noise" aria-hidden="true"></div>

  <div class="home">
    <div class="home-layout">
      <aside class="home-wing home-wing--left" aria-hidden="true">
        <img
          class="home-wing__img"
          src="assets/home-mascots.png"
          alt=""
          width="360"
          height="360"
          decoding="async"
        />
      </aside>

      <div class="home-main">
    <div class="user-bar-wrap">
      <div id="user-bar" class="user-bar"></div>
    </div>
    <header class="home-hero">
      <div class="home-hero__badges">
        <span class="home-pill">即開即玩</span>
        <span class="home-pill home-pill--dim">無需下載</span>
      </div>
      <h1 class="home-title">
        <span class="home-title__line">遊戲大廳</span>
        <span class="home-title__accent" lang="en">ARCADE</span>
      </h1>
      <p class="home-tagline">
        棋類對戰與邏輯解謎，一頁搞定。<wbr />選一張卡，立刻開始。
      </p>
    </header>

    <figure class="home-mascots" aria-hidden="true">
      <img
        src="assets/home-mascots.png"
        alt=""
        width="640"
        height="220"
        decoding="async"
        loading="lazy"
      />
    </figure>
    <p class="home-mascots-note">原創 Q 版風格看板娘（非特定作品角色）</p>

    <section class="home-showcase" aria-label="遊戲列表">
      <p class="home-showcase__label">熱門入口</p>
      <div class="game-cards">
        <a class="game-card game-card--gomoku" href="gomoku.html">
          <span class="game-card__shine" aria-hidden="true"></span>
          <span class="game-card__index" aria-hidden="true">01</span>
          <span class="game-card__icon" aria-hidden="true">◉</span>
          <h2 class="game-card__title">五子棋</h2>
          <p class="game-card__meta">15×15 · 對戰 AI</p>
          <p class="game-card__desc">木質棋盤、三種難度、戰績與悔棋。</p>
          <span class="game-card__cta">
            <span>開始</span>
            <svg class="game-card__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
              <path d="M5 12h14M13 5l7 7-7 7" />
            </svg>
          </span>
        </a>

        <a class="game-card game-card--go" href="go.html">
          <span class="game-card__shine" aria-hidden="true"></span>
          <span class="game-card__index" aria-hidden="true">02</span>
          <span class="game-card__icon" aria-hidden="true">◎</span>
          <h2 class="game-card__title">圍棋</h2>
          <p class="game-card__meta">9×9 · 雙人同機</p>
          <p class="game-card__desc">提子、劫、虛手，連續虛手後簡化數地。</p>
          <span class="game-card__cta">
            <span>開始</span>
            <svg class="game-card__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
              <path d="M5 12h14M13 5l7 7-7 7" />
            </svg>
          </span>
        </a>

        <a class="game-card game-card--sudoku" href="sudoku.html">
          <span class="game-card__shine" aria-hidden="true"></span>
          <span class="game-card__index" aria-hidden="true">03</span>
          <span class="game-card__icon" aria-hidden="true">▦</span>
          <h2 class="game-card__title">數獨</h2>
          <p class="game-card__meta">9×9 · 自動出題</p>
          <p class="game-card__desc">三種難度、衝突提示、鍵盤與數字盤。</p>
          <span class="game-card__cta">
            <span>開始</span>
            <svg class="game-card__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
              <path d="M5 12h14M13 5l7 7-7 7" />
            </svg>
          </span>
        </a>

        <a class="game-card game-card--fighter" href="fighter.html">
          <span class="game-card__shine" aria-hidden="true"></span>
          <span class="game-card__index" aria-hidden="true">04</span>
          <span class="game-card__icon" aria-hidden="true">⚔</span>
          <h2 class="game-card__title">雙人快打</h2>
          <p class="game-card__meta">火柴人 · 三職業</p>
          <p class="game-card__desc">攻擊／防禦／遠程與專屬技能，擬真攻防姿態，三戰兩勝。</p>
          <span class="game-card__cta">
            <span>開始</span>
            <svg class="game-card__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
              <path d="M5 12h14M13 5l7 7-7 7" />
            </svg>
          </span>
        </a>
      </div>
    </section>

    <footer class="home-footer">
      <figure class="home-mascots home-mascots--mini" aria-hidden="true">
        <img
          src="assets/home-mascots.png"
          alt=""
          width="320"
          height="110"
          decoding="async"
          loading="lazy"
        />
      </figure>
      <p>純前端小遊戲 · 隨開隨玩</p>
    </footer>
      </div>

      <aside class="home-wing home-wing--right" aria-hidden="true">
        <img
          class="home-wing__img home-wing__img--mirror"
          src="assets/home-mascots.png"
          alt=""
          width="360"
          height="360"
          decoding="async"
        />
      </aside>
    </div>
  </div>
  <script src="auth.js"></script>
  <script src="user-bar.js"></script>
</body>
</html>
