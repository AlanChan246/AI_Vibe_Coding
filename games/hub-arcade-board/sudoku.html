<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數獨 9×9</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="sudoku.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="app sudoku-app">
    <nav class="game-nav game-nav--split">
      <a href="index.html" class="nav-back">← 返回主頁</a>
      <div id="user-bar" class="user-bar"></div>
    </nav>
    <header class="header">
      <h1>數獨</h1>
      <p class="subtitle">點選格子後用數字鍵或下方按鈕填入 1–9</p>
    </header>

    <section class="controls sudoku-controls" aria-label="遊戲控制">
      <div class="control-row sudoku-control-row">
        <fieldset class="difficulty-field sudoku-diff">
          <legend class="difficulty-legend">難度</legend>
          <div class="diff-buttons" role="presentation">
            <label class="diff-option">
              <input type="radio" name="sudoku-diff" value="easy" checked />
              <span class="diff-option-label">簡單</span>
            </label>
            <label class="diff-option">
              <input type="radio" name="sudoku-diff" value="medium" />
              <span class="diff-option-label">普通</span>
            </label>
            <label class="diff-option">
              <input type="radio" name="sudoku-diff" value="hard" />
              <span class="diff-option-label">困難</span>
            </label>
          </div>
        </fieldset>
        <button type="button" id="sudoku-new" class="btn primary">新題目</button>
        <button type="button" id="sudoku-clear" class="btn secondary">清除填寫</button>
      </div>
      <p id="sudoku-status" class="status sudoku-status" role="status">準備開始</p>
    </section>

    <main class="main sudoku-main">
      <div class="sudoku-wrap">
        <div
          id="sudoku-grid"
          class="sudoku-grid"
          role="grid"
          aria-label="數獨九宮格"
        ></div>
        <div class="sudoku-pad" aria-label="數字輸入">
          <div class="sudoku-pad-row">
            <button type="button" class="pad-btn" data-digit="1">1</button>
            <button type="button" class="pad-btn" data-digit="2">2</button>
            <button type="button" class="pad-btn" data-digit="3">3</button>
            <button type="button" class="pad-btn" data-digit="4">4</button>
            <button type="button" class="pad-btn" data-digit="5">5</button>
            <button type="button" class="pad-btn" data-digit="6">6</button>
            <button type="button" class="pad-btn" data-digit="7">7</button>
            <button type="button" class="pad-btn" data-digit="8">8</button>
            <button type="button" class="pad-btn" data-digit="9">9</button>
          </div>
          <button type="button" id="sudoku-erase" class="btn secondary pad-erase">清除格內數字</button>
        </div>
      </div>
    </main>
  </div>
  <script src="auth.js"></script>
  <script src="user-bar.js"></script>
  <script src="sudoku.js"></script>
</body>
</html>
