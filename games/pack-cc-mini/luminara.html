<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Luminara — a fantasy choice RPG for ages 12+. Play in your browser; progress saves locally."
    />
    <title>Luminara — Starfall RPG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-aurora" aria-hidden="true"></div>
    <div class="bg-mesh" aria-hidden="true"></div>
    <div class="stars stars--a" aria-hidden="true"></div>
    <div class="stars stars--b" aria-hidden="true"></div>
    <div class="orbs" aria-hidden="true">
      <span class="orb orb--1"></span>
      <span class="orb orb--2"></span>
      <span class="orb orb--3"></span>
    </div>

    <main class="app" id="app">
      <header class="hero">
        <p class="badge">Ages 12+ · Fantasy adventure</p>
        <h1 class="logo">Luminara</h1>
        <p class="tagline">Choices, courage, and a sky full of secrets</p>
      </header>

      <section class="hud" aria-label="Character status">
        <div class="hud-block">
          <span class="hud-label">Vitality</span>
          <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="hp-bar-wrap">
            <div class="bar-fill bar-fill--hp" id="hp-bar"></div>
          </div>
          <span class="hud-value" id="hp-text">20 / 20</span>
        </div>
        <div class="hud-block hud-block--gold">
          <span class="hud-label">Gold</span>
          <span class="gold-pile" id="gold-text">0</span>
        </div>
        <div class="hud-block hud-block--inv">
          <span class="hud-label">Relics</span>
          <ul class="inv" id="inventory"></ul>
        </div>
      </section>

      <article class="scene" id="scene-root" aria-live="polite">
        <div class="scene-frame" aria-hidden="true"></div>
        <div class="scene-art-wrap">
          <div class="scene-art-glow" aria-hidden="true"></div>
          <div class="scene-art" id="scene-art" aria-hidden="true">✦</div>
        </div>
        <h2 class="scene-title" id="scene-title">Welcome</h2>
        <div class="scene-body">
          <p id="scene-text"></p>
        </div>
        <div class="dice-banner" id="dice-banner" hidden></div>
        <nav class="choices" id="choices" aria-label="Story choices"></nav>
      </article>

      <footer class="footer">
        <button type="button" class="btn ghost" id="btn-save">Save now</button>
        <button type="button" class="btn ghost danger" id="btn-new">New game</button>
        <p class="fineprint">Progress is stored only on this device.</p>
      </footer>
    </main>

    <script src="definitions.js"></script>
    <script src="state.js"></script>
    <script src="main.js"></script>
  </body>
</html>
